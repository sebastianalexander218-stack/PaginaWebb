{% extends "base.html" %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<div style="max-width:600px; margin:40px auto; background:white; padding:30px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.1);">
    <h2 style="color:#2a6e3f;">{{ titulo }}</h2>
    <form method="POST">
        <label style="font-weight:600; display:block; margin-top:15px;">Nombre *</label>
        <input type="text" name="nombre" value="{{ producto.nombre if producto else '' }}" required style="width:100%; padding:10px; border-radius:12px; border:1px solid #ccc;">

        <label style="font-weight:600; display:block; margin-top:15px;">Descripción</label>
        <textarea name="descripcion" rows="3" style="width:100%; padding:10px; border-radius:12px; border:1px solid #ccc;">{{ producto.descripcion if producto else '' }}</textarea>

        <label style="font-weight:600; display:block; margin-top:15px;">Precio (S/) *</label>
        <input type="number" step="0.01" name="precio" value="{{ producto.precio if producto else '' }}" required style="width:100%; padding:10px; border-radius:12px; border:1px solid #ccc;">

        <label style="font-weight:600; display:block; margin-top:15px;">URL de la imagen</label>
        <input type="url" name="imagen" value="{{ producto.imagen if producto else '' }}" style="width:100%; padding:10px; border-radius:12px; border:1px solid #ccc;">

        <button type="submit" style="background:#2a6e3f; color:white; border:none; padding:12px 20px; border-radius:25px; margin-top:20px; cursor:pointer; font-weight:600;">
            {{ 'Guardar' if not producto else 'Actualizar' }}
        </button>
        <a href="/admin/productos" style="margin-left:15px; color:#2a6e3f; text-decoration:none;">Cancelar</a>
    </form>
</div>
{% endblock %}
